name: API_Deployment_on_EC2
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Push to EC2 Instance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Sync files to EC2
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.HOST_DNS }}
          REMOTE_USER: ${{ secrets.USERNAME }}
          TARGET: "/var/www/html/trade/"
          EXCLUDE: ".env, node_modules/"

      - name: Install deps & restart app via PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Fix npm prefix conflict that breaks nvm
            npm config delete prefix 2>/dev/null || true

            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh

            # Pin Node 16 — works on Amazon Linux 2 (GLIBC 2.17+)
            # Node 18/20 requires GLIBC 2.28 which Amazon Linux 2 does NOT have
            nvm use 16 2>/dev/null || (nvm install 16 && nvm use 16)
            nvm alias default 16

            cd /var/www/html/trade/

            npm install --omit=dev

            # Start or reload
            pm2 describe trading-bot > /dev/null 2>&1 \
              && pm2 reload trading-bot \
              || pm2 start src/app.js --name trading-bot

            pm2 save

            # Auto-start PM2 (and trading-bot) on server reboot
            PM2_PATH=$(which pm2)
            sudo env PATH=$PATH:$(dirname $PM2_PATH) pm2 startup systemd -u $USER --hp $HOME